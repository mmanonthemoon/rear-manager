<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#g)"/>
  <!-- Floppy disk body -->
  <rect x="12" y="10" width="40" height="44" rx="3" fill="#fff" opacity="0.95"/>
  <!-- Disk label -->
  <rect x="16" y="14" width="32" height="18" rx="2" fill="#f97316" opacity="0.85"/>
  <!-- Disk slot -->
  <rect x="16" y="36" width="32" height="14" rx="2" fill="#e5e7eb"/>
  <!-- Shutter -->
  <rect x="26" y="10" width="10" height="10" rx="1" fill="#9ca3af"/>
  <!-- Label lines -->
  <rect x="19" y="18" width="20" height="2" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="19" y="22" width="14" height="2" rx="1" fill="#fff" opacity="0.5"/>
  <!-- Circle on disk -->
  <circle cx="37" cy="43" r="4" fill="#6b7280"/>
  <circle cx="37" cy="43" r="2" fill="#9ca3af"/>
</svg>
